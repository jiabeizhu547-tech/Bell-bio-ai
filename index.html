const FADE_MS = 500;
const FADE_OUT_LEAD = 0.55;

const FadingVideo = ({ src, className, style }) => {
  const videoRef = useRef(null);
  const rafRef = useRef(null);
  const fadingOutRef = useRef(false);
  const [loadFailed, setLoadFailed] = useState(false);

  const fadeTo = useCallback((target, duration) => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    const video = videoRef.current;
    if (!video) return;
    const startOpacity = parseFloat(video.style.opacity) || 0;
    const startTime = performance.now();
    const animate = (now) => {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      video.style.opacity = startOpacity + (target - startOpacity) * progress;
      if (progress < 1) rafRef.current = requestAnimationFrame(animate);
    };
    rafRef.current = requestAnimationFrame(animate);
  }, []);

  useEffect(() => {
    const video = videoRef.current;
    if (!video) return;
    video.style.opacity = '0';
    const onLoadedData = () => { video.play().catch(() => {}); fadeTo(1, FADE_MS); };
    const onTimeUpdate = () => {
      if (!fadingOutRef.current && video.duration - video.currentTime <= FADE_OUT_LEAD && video.duration - video.currentTime > 0) {
        fadingOutRef.current = true; fadeTo(0, FADE_MS);
      }
    };
    const onEnded = () => {
      video.style.opacity = '0'; fadingOutRef.current = false;
      setTimeout(() => { video.currentTime = 0; video.play().catch(() => {}); fadeTo(1, FADE_MS); }, 100);
    };
    const onError = () => { setLoadFailed(true); };
    video.addEventListener('loadeddata', onLoadedData);
    video.addEventListener('timeupdate', onTimeUpdate);
    video.addEventListener('ended', onEnded);
    video.addEventListener('error', onError);
    if (video.readyState >= 2) onLoadedData();
    return () => {
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
      video.removeEventListener('loadeddata', onLoadedData);
      video.removeEventListener('timeupdate', onTimeUpdate);
      video.removeEventListener('ended', onEnded);
      video.removeEventListener('error', onError);
    };
  }, [fadeTo]);

  return (
    <video ref={videoRef} src={src} autoPlay muted playsInline preload="auto"
      className={className} style={loadFailed ? { ...style, display: 'none' } : style} />
  );
};

const BlurText = ({ text, className }) => {
  const containerRef = useRef(null);
  const [isVisible, setIsVisible] = useState(false);
  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    const observer = new IntersectionObserver(([entry]) => { if (entry.isIntersecting) { setIsVisible(true); observer.disconnect(); } }, { threshold: 0.1 });
    observer.observe(el);
    return () => observer.disconnect();
  }, []);
  const words = text.split(' ');
  return (
    <p ref={containerRef} className={className} style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', rowGap: '0.1em' }}>
      {words.map((word, i) => (
        <motion.span key={i}
          initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
          animate={isVisible ? { filter: 'blur(0px)', opacity: 1, y: 0 } : {}}
          transition={{ duration: 0.7, ease: 'easeOut', delay: (i * 100) / 1000 }}
          style={{ display: 'inline-block', marginRight: '0.28em' }}>
          {word}
        </motion.span>
      ))}
    </p>
  );
};
